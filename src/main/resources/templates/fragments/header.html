<header
  id="header"
  class="header fixed-top d-flex align-items-center bg-warning"
>
  <div class="d-flex align-items-center justify-content-between">
    <a th:href="@{/}" class="logo d-flex align-items-center">
      <!-- <img th:src="@{/assets/img/logo.png}" alt=""> -->
      <span class="d-none d-lg-block">Project Tracking</span>
    </a>
    <i class="bi bi-list toggle-sidebar-btn"></i>
  </div>

  <nav class="header-nav ms-auto">
    <ul class="d-flex align-items-center">
      <li class="nav-item d-block d-lg-none">
        <a class="nav-link nav-icon search-bar-toggle" href="#"
          ><i class="bi bi-search"></i
        ></a>
      </li>

      <!-- Profile -->
      <li class="nav-item dropdown pe-3">
        <a
          class="nav-link nav-profile d-flex align-items-center pe-0"
          href="#"
          data-bs-toggle="dropdown"
        >
          <img
            th:src="@{/assets/img/profile-img.jpg}"
            alt="Profile"
            class="rounded-circle"
          />
          <span class="d-none d-md-block dropdown-toggle ps-2"
            >K. Anderson</span
          >
        </a>
        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow profile">
          <li>
            <form th:action="@{/logout}" method="post" style="display: inline">
              <button
                type="submit"
                class="dropdown-item d-flex align-items-center"
                style="
                  border: none;
                  background: none;
                  padding: 0;
                  cursor: pointer;
                "
              >
                <i class="bi bi-box-arrow-right"></i><span>Sign Out</span>
              </button>
            </form>
          </li>
        </ul>
      </li>
    </ul>
  </nav>
</header>
<!-- End Header -->
