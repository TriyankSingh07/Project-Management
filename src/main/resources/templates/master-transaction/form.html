<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8">
	<meta content="width=device-width, initial-scale=1.0" name="viewport">
	<title th:text="${transaction.id != null ? 'Edit Master Transaction' : 'Add Master Transaction'}">Master Transaction</title>
	<link th:href="@{/assets/img/favicon.png}" rel="icon">
	<link th:href="@{/assets/img/apple-touch-icon.png}" rel="apple-touch-icon">
	<link href="https://fonts.gstatic.com" rel="preconnect">
	<link
		href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Nunito:300,300i,400,400i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i"
		rel="stylesheet">
	<link th:href="@{/assets/vendor/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
	<link th:href="@{/assets/vendor/bootstrap-icons/bootstrap-icons.css}" rel="stylesheet">
	<link th:href="@{/assets/vendor/boxicons/css/boxicons.min.css}" rel="stylesheet">
	<link th:href="@{/assets/vendor/quill/quill.snow.css}" rel="stylesheet">
	<link th:href="@{/assets/vendor/quill/quill.bubble.css}" rel="stylesheet">
	<link th:href="@{/assets/vendor/remixicon/remixicon.css}" rel="stylesheet">
	<link th:href="@{/assets/vendor/simple-datatables/style.css}" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link th:href="@{/assets/css/style.css}" rel="stylesheet">
	<link th:href="@{/assets/css/custom.css}" rel="stylesheet">
</head>

<body>
	<div th:replace="~{fragments/header :: header}"></div>
	<div th:replace="~{fragments/sidebar :: sidebar}"></div>

	<main id="main" class="main">
		<div class="pagetitle">
			<h1 th:text="${transaction.id != null ? 'Edit transaction' : 'New transaction'}">Transaction</h1>
			<nav>
				<ol class="breadcrumb">
					<li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
					<li class="breadcrumb-item"><a th:href="@{/master-transaction/list}">Master transactions</a></li>
					<li class="breadcrumb-item active" th:text="${transaction.id != null ? 'Edit' : 'Add'}">Form</li>
				</ol>
			</nav>
		</div>

		<section class="section">
			<div class="row">
				<div class="col-lg-8">
					<div class="card">
						<div class="card-body">
							<h5 class="card-title mb-4"
								th:text="${transaction.id != null ? 'Update details' : 'Create a new record'}">Details</h5>

							<form th:action="@{/master-transaction/save}" method="post" th:object="${transaction}" class="row g-3">
								<input type="hidden" th:field="*{id}" th:if="${transaction.id != null}">

								<div class="col-12">
									<label for="name" class="form-label">Name</label>
									<input id="name" type="text" class="form-control" th:field="*{name}"
										placeholder="Enter name" required>
								</div>

								<div class="col-12">
									<label for="status" class="form-label">Status</label>
									<input id="status" type="number" class="form-control" th:field="*{status}"
										placeholder="e.g. 1 = active">
								</div>

								<div class="col-12 d-flex gap-2 pt-2">
									<button type="submit" class="btn btn-primary">
										<i class="bi bi-check2-circle"></i> Save
									</button>
									<a th:href="@{/master-transaction/list}" class="btn btn-outline-secondary">Cancel</a>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</section>
	</main>

	<div th:replace="~{fragments/footer :: footer}"></div>

	<script th:src="@{/assets/vendor/apexcharts/apexcharts.min.js}"></script>
	<script th:src="@{/assets/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
	<script th:src="@{/assets/vendor/chart.js/chart.umd.js}"></script>
	<script th:src="@{/assets/vendor/echarts/echarts.min.js}"></script>
	<script th:src="@{/assets/vendor/quill/quill.js}"></script>
	<script th:src="@{/assets/vendor/simple-datatables/simple-datatables.js}"></script>
	<script th:src="@{/assets/vendor/tinymce/tinymce.min.js}"></script>
	<script th:src="@{/assets/vendor/php-email-form/validate.js}"></script>
	<script th:src="@{/assets/js/main.js}"></script>
	<script th:src="@{/assets/js/custom.js}"></script>
</body>

</html>
