<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{index::Layout(~{::div})}">

<head>
	<meta charset="UTF-8">
	<title>Create Client</title>
</head>

<body>

<div>

	<div class="pagetitle">
		<h1>Create Client</h1>
	</div>

	<section class="section">

		<div class="card">

			<div class="card-body">

				<h5 class="card-title">Create Client</h5>

				<form th:action="@{/master-client/save}"
					th:object="${client}"
					method="post">

					<div class="row">

						<!-- Client Name -->
						<div class="col-md-4 mb-3">

							<label class="form-label fw-bold">
								NAME
							</label>

							<input type="text"
								th:field="*{name}"
								class="form-control"
								placeholder="Enter">

						</div>

						<!-- Email -->
						<div class="col-md-4 mb-3">

							<label class="form-label fw-bold">
								EMAIL ID
							</label>

							<input type="email"
								th:field="*{email}"
								class="form-control"
								placeholder="Enter">

						</div>

						<!-- Phone -->
						<div class="col-md-4 mb-3">

							<label class="form-label fw-bold">
								PHONE NUMBER
							</label>

							<input type="text"
								th:field="*{phone}"
								class="form-control"
								placeholder="Enter">

						</div>

					</div>

					<div class="row">

						<!-- Contact Person -->
						<div class="col-md-4 mb-3">

							<label class="form-label fw-bold">
								CONTACT PERSON
							</label>

							<input type="text"
								th:field="*{contact}"
								class="form-control"
								placeholder="Enter">

						</div>

						<!-- Status -->
						<div class="col-md-4 mb-3">

							<label class="form-label fw-bold">
								STATUS
							</label>

							<select th:field="*{status}"
								class="form-select">

								<option value="">Select</option>
								<option value="1">Active</option>
								<option value="0">Inactive</option>

							</select>

						</div>

					</div>

					<div class="mt-3">

						<a th:href="@{/list}"
							class="btn btn-secondary">

							Cancel

						</a>

						<button type="submit"
							class="btn btn-primary">

							Create

						</button>

					</div>

				</form>

			</div>

		</div>

	</section>

</div>

</body>
</html>
