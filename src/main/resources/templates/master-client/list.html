<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{index::Layout(~{::div})}">

<head>
	<meta charset="UTF-8">
	<title>Master Client List</title>
</head>

<body>

	<div>

		<div class="pagetitle">
			<h1>Master Clients</h1>
		</div>

		<section class="section">

			<div class="card">

				<div class="card-body">

					<div class="d-flex justify-content-between align-items-center mb-3">

						<h5 class="card-title">All Clients</h5>

						<a th:href="@{/master-client/add}" class="btn btn-primary">
							Add New
						</a>

					</div>

					<div class="table-responsive">

						<table class="table table-hover">

							<thead>
								<tr>
									<th style="background-color:#a2d2ff !important; color:black !important;">ID</th>
									<th style="background-color:#a2d2ff !important; color:black !important;">Name</th>
									<th style="background-color:#a2d2ff !important; color:black !important;">Email</th>
									<th style="background-color:#a2d2ff !important; color:black !important;">Phone</th>
									<th style="background-color:#a2d2ff !important; color:black !important;">Contact
									</th>
									<th style="background-color:#a2d2ff !important; color:black !important;">Status</th>
									<th style="background-color:#a2d2ff !important; color:black !important;">Action</th>
								</tr>
							</thead>

							<tbody>

								<tr th:if="${#lists.isEmpty(list)}">
									<td colspan="7" class="text-center">
										No Data Found
									</td>
								</tr>

								<tr th:each="client : ${list}">

									<td th:text="${client.id}"></td>

									<td th:text="${client.name}"></td>

									<td th:text="${client.email}"></td>

									<td th:text="${client.phone}"></td>

									<td th:text="${client.contact}"></td>

									<td>

										<span th:if="${client.status == 1}" class="badge bg-success">

											Active

										</span>

										<span th:if="${client.status == 0}" class="badge bg-danger">

											Inactive

										</span>

									</td>

									<td>

										<a th:href="@{'/master-client/edit/' + ${client.id}}"
											class="btn btn-sm btn-primary">

											<i class="fa-solid fa-pen-to-square"></i>

										</a>

									</td>

								</tr>

							</tbody>

						</table>

					</div>

				</div>

			</div>

		</section>

	</div>

</body>

</html>
